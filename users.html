<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="ISO-8859-1">
	<title>Index page</title>
</head>

<body>
	<section>
		<div class="container-fluid mt-5 p-5">

			<div class="card card-sh">
				<div class="card-header text-center">
					<p class="fs-4" th:if="${userType==1}">Users</p>
					<p class="fs-4" th:if="${userType==2}">Admin</p>
					<th:block th:if="${session.successMsg}">
						<p class="text-success fw-bold">[[${session.successMsg}]]</p>
						<th:block th:text="${@commonserviceimpl.removesessionmsg()}"></th:block>
					</th:block>

					<th:block th:if="${session.errorMsg}">
						<p class="text-danger fw-bold">[[${session.errorMsg}]]</p>
						<th:block th:text="${@commonserviceimpl.removesessionmsg()}"></th:block>
					</th:block>
				</div>
				<div class="card-body">
					<table class="table">
						<thead>
							<tr>
								<th scope="col">SI No.</th>
								<th scope="col">Profile</th>
								<th scope="col">Name</th>
								<th scope="col">Email</th>
								<th scope="col">Mobile No.</th>
								<th scope="col">Address</th>
								<th scope="col">Status</th>
								<th scope="col">Action</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="u,c:${users}">
								<th scope="row">[[${c.count}]]</th>
								<td><img th:src="@{'/Img/Saved/'+${u.profile_image}}" width="70px" height="70px"></td>
								<td>[[${u.name}]]</td>
								<td>[[${u.email}]]</td>
								<td>[[${u.mobileNumber}]]</td>
								<td th:text="${u.address + ', ' + u.city + ', ' + u.state + ', ' + u.pincode}"></td>


								<td>[[${u.isEnable}]]</td>
								
								<td>
									<a th:href="@{'/admin/updateSts?id=' + ${u.id} + '&status=' + ${!u.isEnable}}+'&type='+${userType}"
									   class="btn btn-sm btn-warning">
									  isEnable(T/f)
									</a>
									
									</td>
							</tr>

						</tbody>
					</table>
				</div>
			</div>
		</div>

		
		
		
	</section>
</body>

</html>
