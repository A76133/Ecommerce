<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="ISO-8859-1">
	<title>Index page</title>
</head>

<body>

	<section>
		<div class="container mt-5 p-5">
			<form action="/user/save-order" method="post" id="orders">
			<div class="row">
				
				<div class="col-md-6  ">
					
						<div class="mb-3 row">
							<p class="text-center fs-4">Filling Address</p>
							<hr>
							<div class="col p-1">
								<label>First Name</label>
								<input type="text" name="firstName" required class="form-control mt-1">
							</div>

							<div class="col p-1">
								<label>Last Name</label>
								<input type="text" name="lastName" required class="form-control mt-1">
							</div>
						</div>

						<div class="mb-3 row">

							<div class="col p-1">
								<label>Email</label>
								
								<input type="Email" name="Email" required class="form-control mt-1">
							</div>

							<div class="col p-1">
								<label>Mobile Number</label>
								<input type="text" name="mobilrNo" required  class="form-control mt-1">
							</div>
						</div>

						<div class="mb-3 row">

							<div class="col p-1">
								<label>Address</label>
								<input type="text" name="address" required class="form-control mt-1">
							</div>

							<div class="col p-1">
								<label>City</label>
								<input type="text" name="city" class="form-control mt-1">
							</div>
						</div>

						<div class="mb-3 row">
							<div class="col p-1">
								<label>State</label>
								<input type="text" name="State" required class="form-control mt-1">
							</div>

							<div class="col p-1">
								<label>Pincode</label>
								<input type="number" name="pincode" required class="form-control col mt-1">
							</div>
						</div>
					
				</div>
				
				<div class="col-md-6">
					
					<p class="text-center fs-4">Pyment Type</p>
					<hr>
					<div class="card">
						<div class="card-body">
							<table class="table table-borderless">
								<tbody>
									<tr>
										<td>Total Price</td>
										<td>:</td>
										<td>&#8377; [[${orderprice}]]</td>
									</tr>
									<tr>
										<td>Delivery Fee</td>
										<td>:</td>
										<td>&#8377; 23223</td>
									</tr>
									<tr>
										<td>Tax</td>
										<td>:</td>
										<td>&#8377; 100</td>
									</tr>
									
									<hr>

									<tr class="border-top">
										<td>Total Price</td>
										<td>:</td>
										<td>&#8377; [[${totalOrderPrice}]]</td>
									</tr>

								</tbody>
							</table>
						</div>
					</div>
					
					<div class="card shadow p-3 mt-2
					
					 mb-5 bg-body-tertiary rounded">

						<div class="card-body">
							
								<div class="mb-3">
									<label class="form-label">Select Payement Type</label>
									<select class="form-control" name="PaymentType" required> 
										<option>.....Select....</option>
										<option value="COD">Cash on Delevery</option>
										<option value="Online">Online Payment</option>

									</select>
								</div>

								<button type="submit" class="btn bg-primary text-white col-md-12">Place Order</button>
							
						</div>

					</div>
				</div>
			

			</div>
			</form>
		</div>

	</section>

</body>

</html>
