<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="ISO-8859-1">
	<title>Index page</title>
</head>

<body>
	<section>
		<div class="container-fluid mt-5 p-5">

			<div class="card card-sh">
				<div class="card-header text-center">
					<p class="fs-4">Cart page</p>
					<th:block th:if="${session.successMsg}">
						<p class="text-success fw-bold">[[${session.successMsg}]]</p>
						<th:block th:text="${@commonserviceimpl.removesessionmsg()}"></th:block>
					</th:block>

					<th:block th:if="${session.errorMsg}">
						<p class="text-danger fw-bold">[[${session.errorMsg}]]</p>
						<th:block th:text="${@commonserviceimpl.removesessionmsg()}"></th:block>
					</th:block>
				</div>
				<div class="card-body">
					<table class="table">
						<thead>
							<tr>
								<th scope="col">SI No.</th>
								<th scope="col">Image</th>
								<th scope="col">Product Name</th>
								<th scope="col">Price</th>
								<th scope="col" class="text-center">Quntity</th>
								<th scope="col">Total Price</th>
								
							</tr>
						</thead>
						<tbody>
							<tr th:each="ca,c:${cart}">
								<th scope="row">[[${c.count}]]</th>
								<td><img th:src="@{'/Img/productImg/'+${ca.product.image}}" width="70px" height="70px"></td>
								<td>[[${ca.product.title}]]</td>
								<td>[[${ca.product.discountPrice}]]</td>
								<td class="text-center">

								    <a th:href="@{/user/cartQuantityUpdate(sy='de',cid=${ca.id})}">
								        <i class="fa-solid fa-minus"></i>
								    </a>

								    [[${ca.quantity}]]

								    <a th:href="@{/user/cartQuantityUpdate(sy='in',cid=${ca.id})}">
								        <i class="fa-solid fa-plus"></i>
								    </a>

								</td>
								<td>[[${ca.totalprice}]]</td>
								
							</tr>
							
							<tr>  
								<td colspan="4"></td>
								<td  class="fw-bold">Total Price</td>
								<td  class="fw-bold">&#8377; [[${totalOrderPrice}]]</td>
							</tr>
                           
						</tbody>
					</table>
					<div class="text-center">
						<a href="/user/orders" class="btn btn-warning">Procced Payment</a>
					</div>
				</div>
			</div>
		</div>

		`
	</section>
</body>

</html>
