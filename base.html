<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">

<head>
	<meta charset="ISO-8859-1">
	<title>Index page</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
		integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />
	<link rel="stylesheet" href="/CSS/style.CSS">
</head>

<body>
	<!-- start navbar -->


	<nav class="navbar navbar-expand-lg  bg-primary fixed-top navbar-dark">
		<div class="container-fluid">
			<a class="navbar-brand" href="#"><i class="fa-solid fa-cart-shopping"></i>Ecome Strore</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
				data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<th:block th:if="${user==null}">

						<li class="nav-item">
							<a class="nav-link active" aria-current="page" href="/"><i
									class="fa-solid fa-house"></i>Home</a>
						</li>
					</th:block>

					<th:block th:unless="${user==null}">

						<li class="nav-item" th:if="${user.role=='ROLE_ADMIN'}">
							<a class="nav-link active" aria-current="page" href="/admin/"><i
									class="fa-solid fa-house"></i>Home</a>
						</li>
						<li class="nav-item" th:if="${user.role=='ROLE_USER'}">
							<a class="nav-link active" aria-current="page" href="/"><i
									class="fa-solid fa-house"></i>Home</a>
						</li>
					</th:block>

					<li class="nav-item">
						<a class="nav-link active" aria-current="page" href="/product">Product</a>
					</li>
					<li class="nav-item dropdown">
						<a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
							aria-expanded="false">
							Category
						</a>
						<ul class="dropdown-menu">
							<li th:each="c:${category}"><a class="dropdown-item"
									th:href="@{'/product?category='+${c.name}}">[[${c.name}]]</a></li>
						</ul>
					</li>

				</ul>

				<ul class="navbar-nav ms-auto mb-2 mb-lg-0">
					<th:block th:if="${user==null}">
						<li class="nav-item">
							<a class="nav-link active" aria-current="page" href="/signin"><i
									class="fa-solid fa-arrow-right-to-bracket"></i>LOGIN</a>
						</li>
						<li class="nav-item">
							<a class="nav-link active" aria-current="page" href="/register">REGISTER</a>
						</li>

					</th:block>

					<th:block th:if="${user!=null}">
						<th:block th:if="${user.role=='ROLE_USER'}">


							<li class="nav-item">
								<a class="nav-link active" aria-current="page" href="/user/cart">
									<i class="fa-solid fa-cart-shopping"></i> Cart [[${countcart}]]
								</a>
							</li>
						</th:block>
						<li class="nav-item dropdown">
							<a class="nav-link dropdown-toggle active" href="#" role="button" data-bs-toggle="dropdown"
								aria-expanded="false">
								<i class="fa-solid fa-user"></i>[[${user.name}]]
							</a>
							<ul class="dropdown-menu">
								<li th:if="${user.role=='ROLE_USER'}"><a class="dropdown-item"
										href="/user/profile">profile</a></li>
								<li th:if="${user.role=='ROLE_ADMIN'}"><a class="dropdown-item"
										href="/admin/profile">profile</a></li>


								<li th:if="${user.role=='ROLE_USER'}"><a class="dropdown-item"
										href="/user/user-orders">My Oredres</a></li>
								<li><a class="dropdown-item" href="/logout"> Logout</a></li>
								<li>
									<hr class="dropdown-divider">
								</li>
							</ul>
						</li>


						<!--<li class="nav-item">
							<a class="nav-link active" aria-current="page" href="/logout">
								<i class="fa-solid fa-right-to-bracket"></i> Logout</a>
						</li>-->
					</th:block>
				</ul>

			</div>

	</nav>

	<!-- ends navbar -->

	<div th:replace="${content}"></div>

	<!--Start footer-->
	<div class="container-fluid p-1 bg-primary text-center text-white" style="margin-top: 100px;">
		<p>ecom.com </p>
	</div>

	<!--End footer librarary-->
	
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>

	<script src="/js/script.js"></script>
	
	<!-- Jquery validation -->

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</body>

</html>
